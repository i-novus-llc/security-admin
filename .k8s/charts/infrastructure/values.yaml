# list of all generic services with specific values for each
genericServices:
  security-db:
    port: 5432
    imageName: /n2o-components/security-admin/db
    imageTag: ${docker.image.tag}
    imagePullPolicy: IfNotPresent
    storageClassName: 'nfs-retain'
    resources:
      requests:
        cpu: 100m
        memory: 200m
      limits:
        memory: 512Mi
        cpu: 300m

    replicaCount: 1
    strategy:
      type: Recreate
    volumes:
      - name: security-db-data
        persistentVolumeClaim:
          claimName: security-db-data
    volumeMounts:
      - mountPath: /pg/14
        name: security-db-data

    terminationGracePeriodSeconds: 15
    lifecycle:
      preStop:
        exec:
          command:
            - /bin/sh
            - -c
            - |
              PIDFILE=$(find /pg/14 -name postmaster.pid 2>/dev/null | head -n1)
              if [ -n "$PIDFILE" ]; then
                kill -INT "$(head -n1 "$PIDFILE")"
                while [ -f "$PIDFILE" ]; do sleep 1; done
              fi
    env:
      POSTGRES_PASSWORD: postgres
